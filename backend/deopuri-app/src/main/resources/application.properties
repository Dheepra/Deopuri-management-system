spring.application.name=deopuri
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/deopuri?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

logging.level.root=INFO
logging.level.com.deopuri=INFO
logging.level.org.springframework.security=INFO

# Structured (JSON) console logging — Spring Boot 4 built-in, one JSON object per line.
# ECS = Elastic Common Schema. The per-request UUID (MDC "requestId") is emitted as a field,
# so the whole request chain can be filtered by it in any log tool.
logging.structured.format.console=ecs
logging.structured.ecs.service.name=deopuri

# Raw SQL is NOT logged (show-sql writes non-JSON lines straight to System.out, and DEBUG SQL
# floods the log). Flip these back on locally only when debugging a query.
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

jwt.secret=${JWT_SECRET:}
# Token lives 10 minutes. The client refreshes it on user activity (POST /deopuri/auth/refresh),
# so an active session stays alive indefinitely; 10 minutes of inactivity lets it expire.
jwt.expiration-ms=${JWT_EXPIRATION_MS:600000}