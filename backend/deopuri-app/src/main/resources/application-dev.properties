# Developer-only overrides. Do NOT use this profile in production.
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.deopuri=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Dev-only signing secret. NEVER commit a real one and NEVER use this in production.
jwt.secret=${JWT_SECRET:dev-only-please-rotate-in-prod-do-not-reuse-this-string-32+chars}
