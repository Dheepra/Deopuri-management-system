<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#157d58" />
    <meta name="description" content="Deopuri — modern management for medical shops. Inventory, sales, and orders in one calm dashboard." />

    <!-- Installable PWA / app-like on mobile -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Deopuri" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Deopuri — Medical Shop Management</title>

    <!-- Instant boot splash: paints before React mounts so opening feels like a native app. -->
    <style>
      #app-splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:16px;
        background:radial-gradient(120% 120% at 50% 0%,#11503a 0%,#0a1124 70%);color:#fff;
        font-family:Inter,system-ui,-apple-system,sans-serif;
        padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
      #app-splash .logo{width:78px;height:78px;border-radius:22px;background:#fff;display:grid;
        place-items:center;box-shadow:0 18px 50px rgba(0,0,0,.4);animation:sp-pop .55s cubic-bezier(.22,1,.36,1)}
      #app-splash .name{font-weight:800;font-size:22px;letter-spacing:.01em}
      #app-splash .sub{font-size:12.5px;opacity:.65;margin-top:-8px;font-weight:500}
      #app-splash .bar{margin-top:6px;width:128px;height:4px;border-radius:99px;background:rgba(255,255,255,.16);overflow:hidden}
      #app-splash .bar i{display:block;height:100%;width:42%;border-radius:99px;background:#fff;animation:sp-bar 1.1s ease-in-out infinite}
      @keyframes sp-pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
      @keyframes sp-bar{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <div class="logo">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#157d58"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2 4 6v6c0 5 3.4 7.7 8 10 4.6-2.3 8-5 8-10V6l-8-4Z" />
            <path d="m9 12 2 2 4-4" />
          </svg>
        </div>
        <div class="name">Deopuri</div>
        <div class="sub">Medical Shop Management</div>
        <div class="bar"><i></i></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
